# MIOS — On-Premise Deployment
#
# Quick start:  ./install.sh
# Manual start: cp .env.onprem.example .env && docker compose -f docker-compose.onprem.yml up -d
#
# Connectors are optional. Enable them with the `connectors` profile:
#   docker compose -f docker-compose.onprem.yml --profile connectors up -d
#
# Requirements: Docker >= 24.0, Docker Compose >= 2.20

name: mios

# ─── Shared defaults ──────────────────────────────────────────────────────────
x-defaults: &defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck: &healthcheck
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

services:
  # ────────────────────────────────────────────────────────────────────────────
  # REVERSE PROXY
  # ────────────────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: mios-traefik
    <<: *defaults
    depends_on:
      - docker-proxy
    command:
      - "--log.level=WARN"
      - "--accesslog=true"
      - "--api=false"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=http://docker-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./certs:/certs:ro,z
      - ./traefik/dynamic:/etc/traefik/dynamic:ro,z
    networks:
      - mios-frontend
      - mios-backend

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.2.0
    container_name: mios-docker-proxy
    <<: *defaults
    environment:
      CONTAINERS: 1
      SERVICES: 0
      NETWORKS: 1
      NODES: 0
      TASKS: 0
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro,z
    networks:
      - mios-frontend
    security_opt:
      - no-new-privileges:true
      - label:disable

  # ────────────────────────────────────────────────────────────────────────────
  # INFRASTRUCTURE
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mios-redis
    <<: *defaults
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - mios-database
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      <<: *healthcheck

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: mios-minio
    <<: *defaults
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: https://minio.${DOMAIN_NAME}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mios-frontend"
      - "traefik.http.routers.minio.rule=Host(`minio.${DOMAIN_NAME}`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls=true"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio.middlewares=secure-headers@file"
    networks:
      - mios-frontend
      - mios-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      <<: *healthcheck

  db-back:
    image: ankane/pgvector:v0.5.1
    container_name: mios-db-back
    <<: *defaults
    environment:
      POSTGRES_USER: ${DB_BACK_USER}
      POSTGRES_PASSWORD: ${DB_BACK_PASSWORD}
      POSTGRES_DB: ${DB_BACK_NAME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - db-back-data:/var/lib/postgresql/data
    networks:
      - mios-database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_BACK_USER} -d ${DB_BACK_NAME}"]
      <<: *healthcheck
    shm_size: "256mb"

  db-ai:
    image: ankane/pgvector:v0.5.1
    container_name: mios-db-ai
    <<: *defaults
    environment:
      POSTGRES_USER: ${DB_AI_USER}
      POSTGRES_PASSWORD: ${DB_AI_PASSWORD}
      POSTGRES_DB: ${DB_AI_NAME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - db-ai-data:/var/lib/postgresql/data
    networks:
      - mios-database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_AI_USER} -d ${DB_AI_NAME}"]
      <<: *healthcheck
    shm_size: "256mb"

  # ────────────────────────────────────────────────────────────────────────────
  # LOCAL AI ENGINE
  # ────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: mios-ollama
    <<: *defaults
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - mios-backend
    healthcheck:
      test: ["CMD", "ollama", "list"]
      <<: *healthcheck
    # Uncomment to enable NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ────────────────────────────────────────────────────────────────────────────
  # APPLICATION SERVICES
  # ────────────────────────────────────────────────────────────────────────────
  prisma-migrate:
    image: ${IMAGE_REGISTRY}/mios-app-back:${IMAGE_TAG:-latest}
    container_name: mios-prisma-migrate
    pull_policy: always
    env_file: .env
    entrypoint: ["bunx", "prisma", "migrate", "deploy"]
    depends_on:
      db-back:
        condition: service_healthy
    networks:
      - mios-database
    restart: "no"

  app-back:
    image: ${IMAGE_REGISTRY}/mios-app-back:${IMAGE_TAG:-latest}
    container_name: mios-app-back
    <<: *defaults
    pull_policy: always
    env_file: .env
    environment:
      PORT: ${BACK_CONTAINER_PORT:-3000}
      NODE_ENV: production
    depends_on:
      db-back:
        condition: service_healthy
      redis:
        condition: service_healthy
      prisma-migrate:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mios-backend"
      - "traefik.http.routers.backend.rule=Host(`api.${DOMAIN_NAME}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=${BACK_CONTAINER_PORT:-3000}"
      - "traefik.http.routers.backend.middlewares=secure-headers@file,rate-limit@file"
    networks:
      - mios-backend
      - mios-database
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${BACK_CONTAINER_PORT:-3000}/health || exit 1"]
      <<: *healthcheck

  app-ai:
    image: ${IMAGE_REGISTRY}/mios-app-ai:${IMAGE_TAG:-latest}
    container_name: mios-app-ai
    <<: *defaults
    pull_policy: always
    env_file: .env
    environment:
      PORT: ${AI_CONTAINER_PORT:-8000}
      AI_PROVIDER: ${AI_PROVIDER:-local}
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      db-ai:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mios-backend"
      - "traefik.http.routers.ai.rule=Host(`ai.${DOMAIN_NAME}`)"
      - "traefik.http.routers.ai.entrypoints=websecure"
      - "traefik.http.routers.ai.tls=true"
      - "traefik.http.services.ai.loadbalancer.server.port=${AI_CONTAINER_PORT:-8000}"
      - "traefik.http.routers.ai.middlewares=secure-headers@file"
    networks:
      - mios-backend
      - mios-database
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${AI_CONTAINER_PORT:-8000}/health || exit 1"]
      <<: *healthcheck

  app-ai-worker:
    image: ${IMAGE_REGISTRY}/mios-app-ai:${IMAGE_TAG:-latest}
    container_name: mios-app-ai-worker
    <<: *defaults
    pull_policy: always
    env_file: .env
    command: ["python", "-m", "app.worker"]
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-local}
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      db-back:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - mios-backend
      - mios-database

  app-front:
    image: ${IMAGE_REGISTRY}/mios-app-front:${IMAGE_TAG:-latest}
    container_name: mios-app-front
    <<: *defaults
    pull_policy: always
    env_file: .env
    depends_on:
      app-back:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mios-frontend"
      - "traefik.http.routers.frontend.rule=Host(`app.${DOMAIN_NAME}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.frontend.middlewares=secure-headers@file"
    networks:
      - mios-frontend
      - mios-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || exit 1"]
      <<: *healthcheck

  app-chatbot:
    image: ${IMAGE_REGISTRY}/mios-app-chatbot:${IMAGE_TAG:-latest}
    container_name: mios-app-chatbot
    <<: *defaults
    pull_policy: always
    env_file: .env
    environment:
      PORT: 8080
    depends_on:
      app-back:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mios-backend"
      - "traefik.http.routers.chatbot.rule=Host(`chatbot.${DOMAIN_NAME}`)"
      - "traefik.http.routers.chatbot.entrypoints=websecure"
      - "traefik.http.routers.chatbot.tls=true"
      - "traefik.http.services.chatbot.loadbalancer.server.port=8080"
      - "traefik.http.routers.chatbot.middlewares=secure-headers@file"
    networks:
      - mios-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      <<: *healthcheck

  # ────────────────────────────────────────────────────────────────────────────
  # CONNECTORS  (opt-in via: --profile connectors)
  # ────────────────────────────────────────────────────────────────────────────
  app-conn-slack:
    image: ${IMAGE_REGISTRY}/mios-connector-slack:${IMAGE_TAG:-latest}
    container_name: mios-app-conn-slack
    <<: *defaults
    pull_policy: always
    profiles: [connectors]
    env_file: .env
    environment:
      PORT: 3000
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mios-backend"
      - "traefik.http.routers.slack.rule=Host(`slack.${DOMAIN_NAME}`)"
      - "traefik.http.routers.slack.entrypoints=websecure"
      - "traefik.http.routers.slack.tls=true"
      - "traefik.http.services.slack.loadbalancer.server.port=3000"
      - "traefik.http.routers.slack.middlewares=secure-headers@file"
    networks:
      - mios-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      <<: *healthcheck

  app-conn-github:
    image: ${IMAGE_REGISTRY}/mios-connector-github:${IMAGE_TAG:-latest}
    container_name: mios-app-conn-github
    <<: *defaults
    pull_policy: always
    profiles: [connectors]
    env_file: .env
    environment:
      PORT: 3000
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mios-backend"
      - "traefik.http.routers.github-conn.rule=Host(`github.${DOMAIN_NAME}`)"
      - "traefik.http.routers.github-conn.entrypoints=websecure"
      - "traefik.http.routers.github-conn.tls=true"
      - "traefik.http.services.github-conn.loadbalancer.server.port=3000"
      - "traefik.http.routers.github-conn.middlewares=secure-headers@file"
    networks:
      - mios-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      <<: *healthcheck

  app-conn-microsoft:
    image: ${IMAGE_REGISTRY}/mios-connector-microsoft:${IMAGE_TAG:-latest}
    container_name: mios-app-conn-microsoft
    <<: *defaults
    pull_policy: always
    profiles: [connectors]
    env_file: .env
    environment:
      PORT: 3000
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mios-backend"
      - "traefik.http.routers.microsoft.rule=Host(`microsoft.${DOMAIN_NAME}`)"
      - "traefik.http.routers.microsoft.entrypoints=websecure"
      - "traefik.http.routers.microsoft.tls=true"
      - "traefik.http.services.microsoft.loadbalancer.server.port=3000"
      - "traefik.http.routers.microsoft.middlewares=secure-headers@file"
    networks:
      - mios-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      <<: *healthcheck

  app-conn-google:
    image: ${IMAGE_REGISTRY}/mios-connector-google:${IMAGE_TAG:-latest}
    container_name: mios-app-conn-google
    <<: *defaults
    pull_policy: always
    profiles: [connectors]
    env_file: .env
    environment:
      PORT: 3000
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mios-backend"
      - "traefik.http.routers.google-conn.rule=Host(`google.${DOMAIN_NAME}`)"
      - "traefik.http.routers.google-conn.entrypoints=websecure"
      - "traefik.http.routers.google-conn.tls=true"
      - "traefik.http.services.google-conn.loadbalancer.server.port=3000"
      - "traefik.http.routers.google-conn.middlewares=secure-headers@file"
    networks:
      - mios-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      <<: *healthcheck

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  mios-frontend:
    driver: bridge
  mios-backend:
    driver: bridge
  mios-database:
    driver: bridge
    internal: true

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  db-back-data:
    name: mios_db_back_data
  db-ai-data:
    name: mios_db_ai_data
  minio-data:
    name: mios_minio_data
  redis-data:
    name: mios_redis_data
  ollama-models:
    name: mios_ollama_models
